server:
  port: 8788

spring:
  application:
    name: healthcare-orchestrator-service
  security:
    oauth2:
      resourceserver:
        jwt:
          # URL where Gateway is running + your JWKS endpoint
          jwk-set-uri: http://${INNER_TOKEN_VALIDATOR_HOST:localhost}:${INNER_TOKEN_VALIDATOR_PORT:8787}/.x114534/jwks.json
          # Must match the 'iss' claim Issuer puts in the JWT
          issuer-uri: healthcare-gateway-service

  r2dbc:
    url: r2dbc:postgresql://localhost:5333/healthcare
    username: doki
    password: doki

  data:
    r2dbc:
      repositories:
        enabled: true
    redis:
      host: localhost
      port: 6379
      password: yourpassword
      # Lettuce is the default driver even in non-reactive
      lettuce:
        pool:
          max-active: 10
          max-wait: 1000ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      # Use the 4.0 Jackson Serializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        # Prefix MUST be 'spring.jackson' for this serializer
        spring.json.add.type.info.headers: true
        spring.json.type.mapping: >
          doctor:hu.minthaka.common.dto.DoctorMessageDTO,
          appointment:hu.minthaka.common.dto.AppointmentMessageDTO
    consumer:
      # These basic settings are safe to keep here
      group-id: health-orchestrator-group
      auto-offset-reset: earliest

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: orchestrator
        version: 1
        environment: Production
        node-name: Primary